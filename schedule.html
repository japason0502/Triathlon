<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🏊🚴🏃 トライアスロン練習会スケジュール</title>
<style>
:root{--primary:#0ea5e9;--primary-dark:#0284c7;--bg:#f0f9ff;--card-bg:#fff;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;--shadow:0 2px 8px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',sans-serif;background:var(--bg);color:var(--text)}
header{background:linear-gradient(135deg,#0284c7,#0ea5e9,#38bdf8);color:#fff;padding:2.5rem 1.5rem 2rem;text-align:center;box-shadow:0 4px 12px rgba(14,165,233,.3)}
header h1{font-size:1.8rem;font-weight:800}
header p{margin-top:.5rem;font-size:.9rem;opacity:.85}
.stats{display:flex;gap:1rem;justify-content:center;margin-top:1.2rem;flex-wrap:wrap}
.stat-chip{background:rgba(255,255,255,.2);padding:.3rem .9rem;border-radius:999px;font-size:.85rem;font-weight:600}
main{max-width:960px;margin:2rem auto;padding:0 1rem}
.section-title{font-size:1.15rem;font-weight:700;color:var(--primary-dark);margin:2rem 0 1rem;padding-bottom:.4rem;border-bottom:2px solid var(--primary)}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
.card{background:var(--card-bg);border-radius:12px;padding:1.1rem 1.2rem;box-shadow:var(--shadow);border:1px solid var(--border);text-decoration:none;color:inherit;display:block;transition:transform .15s,box-shadow .15s}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.12);border-color:var(--primary)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.75rem}
.date-badge{display:flex;flex-direction:column;gap:.1rem}
.date-main{font-size:1rem;font-weight:700;color:var(--primary-dark)}
.weekday,.time{font-size:.8rem;color:var(--muted)}
.time{font-weight:600}
.badge{font-size:.7rem;padding:.2rem .55rem;border-radius:999px;font-weight:700;white-space:nowrap}
.event-title{font-size:.95rem;font-weight:700;line-height:1.4;margin-bottom:.5rem}
.event-place{font-size:.82rem;color:var(--muted)}
.past-section{opacity:.7}
.empty{color:var(--muted);text-align:center;padding:2rem}
.loading{text-align:center;padding:3rem;color:var(--muted);font-size:1rem}
footer{text-align:center;padding:2rem;font-size:.8rem;color:var(--muted);border-top:1px solid var(--border);margin-top:3rem}
@media(max-width:480px){header h1{font-size:1.4rem}.cards-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<header>
  <h1>🏊 🚴 🏃 トライアスロン練習会</h1>
  <p>サイクルショップエンドウ / Triathlon LUMINA / 横浜市トライアスロン協会</p>
  <div class="stats">
    <span class="stat-chip" id="stat-count">読み込み中...</span>
    <span class="stat-chip" id="stat-updated">-</span>
  </div>
</header>

<main>
  <h2 class="section-title">📅 今後の練習会・イベント</h2>
  <div class="cards-grid" id="upcoming-grid">
    <p class="loading">データを読み込んでいます...</p>
  </div>

  <h2 class="section-title past-section">📁 過去のイベント（直近12件）</h2>
  <div class="cards-grid past-section" id="past-grid"></div>
</main>

<footer>
  <p>
    データソース:
    <a href="https://cycleshopendo.com/shop/post-25594.html" style="color:var(--primary)">エンドウ</a> /
    <a href="https://triathlon-lumina.com/category/item/entry/" style="color:var(--primary)">LUMINA</a> /
    <a href="https://www.kn-tu.or.jp/yta/news/recruiting-participants" style="color:var(--primary)">横浜市TA</a>
  </p>
  <p style="margin-top:.3rem">
    Claude スキルにより手動更新 |
    <a href="https://github.com/japason0502/Triathlon" style="color:var(--primary)">GitHub</a>
  </p>
</footer>

<script>
const SOURCE_STYLES = {
  "エンドウ練習会": { bg: "#fef9c3", fg: "#854d0e", label: "エンドウ" },
  "LUMINA":        { bg: "#fce7f3", fg: "#9d174d", label: "LUMINA" },
  "横浜市TA":      { bg: "#dcfce7", fg: "#166534", label: "横浜市TA" },
};

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function buildCard(ev) {
  const style = SOURCE_STYLES[ev.source] || { bg: "#f1f5f9", fg: "#334155", label: ev.source || "" };
  const timeHtml    = ev.time    ? `<span class="time">${escapeHtml(ev.time)}〜</span>` : "";
  const weekdayHtml = ev.weekday ? `<span class="weekday">(${escapeHtml(ev.weekday)})</span>` : "";

  return `
    <a class="card" href="${escapeHtml(ev.url || "#")}" target="_blank" rel="noopener">
      <div class="card-header">
        <div class="date-badge">
          <span class="date-main">${escapeHtml(ev.date || "")}</span>
          ${weekdayHtml}
          ${timeHtml}
        </div>
        <span class="badge" style="background:${style.bg};color:${style.fg}">${escapeHtml(style.label)}</span>
      </div>
      <div class="card-body">
        <h3 class="event-title">${escapeHtml(ev.title || "")}</h3>
        <p class="event-place">📍 ${escapeHtml(ev.place || "")}</p>
      </div>
    </a>`;
}

async function loadEvents() {
  let events;
  try {
    const res = await fetch('./triathlon_events.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    events = await res.json();
  } catch (e) {
    document.getElementById("upcoming-grid").innerHTML =
      `<p class="empty">データの読み込みに失敗しました (${e.message})</p>`;
    return;
  }

  const nowIso = new Date().toISOString();
  const upcoming = events
    .filter(e => (e.sort_key || "") >= nowIso)
    .sort((a, b) => a.sort_key.localeCompare(b.sort_key));
  const past = events
    .filter(e => (e.sort_key || "") < nowIso)
    .sort((a, b) => a.sort_key.localeCompare(b.sort_key));

  // 今後
  const upGrid = document.getElementById("upcoming-grid");
  upGrid.innerHTML = upcoming.length
    ? upcoming.map(buildCard).join("")
    : '<p class="empty">今後の予定はありません</p>';

  // 過去（直近12件・新しい順）
  const pastGrid = document.getElementById("past-grid");
  pastGrid.innerHTML = past.length
    ? past.slice(-12).reverse().map(buildCard).join("")
    : '<p class="empty">過去のイベントはありません</p>';

  // ヘッダー統計
  document.getElementById("stat-count").textContent = `今後の予定: ${upcoming.length}件`;

  // JSON内の最終更新日時を表示（あれば）
  // ※スキルが updated_at フィールドを書き込む場合はそちらを使う
  const updatedAt = events._updated_at;  // 将来的な拡張用
  document.getElementById("stat-updated").textContent = updatedAt
    ? `更新: ${updatedAt}`
    : `読み込み: ${new Date().toLocaleString("ja-JP", { timeZone: "Asia/Tokyo" })}`;
}

loadEvents();
</script>
</body>
</html>
