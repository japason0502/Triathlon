name: トライアスロンスケジュール自動更新

on:
  # 毎日 6:00 JST (21:00 UTC) に自動実行
  schedule:
    - cron: "0 21 * * *"

  # 手動でも実行できる
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

# checkout / setup-python など JS Action を Node 24 で実行（runner 既定の Node 20 廃止前の先行対応）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v6

      - name: Python セットアップ
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: スケジュール取得 & HTML生成（AI解析）
        env:
          # GitHub リポジトリの Settings → Secrets → Actions に登録する
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python triathlon_fetcher.py

      - name: ブログ記事一覧（posts.json）を生成
        run: python build_blog_manifest.py

      - name: 公開用ディレクトリを用意
        run: |
          mkdir -p _site
          cp index.html schedule.html _site/
          cp -r blog assets _site/

      - name: Pages 用に設定
        uses: actions/configure-pages@v5

      - name: 静的サイトをアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pages にデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
