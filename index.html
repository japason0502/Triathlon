<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="湘南エリアのトライアスロン練習会スケジュールとブログ" />
    <title>🏊🚴🏃 Triathlon | ホーム</title>
    <link rel="stylesheet" href="assets/css/blog.css" />
    <style>
      .landing-lead {
        font-size: 1rem;
        color: var(--muted);
        max-width: 36rem;
        margin-bottom: 2rem;
        line-height: 1.75;
      }
      .landing-cards {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 1rem;
      }
      .landing-card {
        display: block;
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1.35rem 1.25rem;
        box-shadow: var(--shadow);
        text-decoration: none;
        color: inherit;
        transition: transform 0.15s, box-shadow 0.15s;
      }
      .landing-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.1);
        border-color: var(--primary);
      }
      .landing-card h2 {
        font-size: 1.1rem;
        font-weight: 800;
        color: var(--primary-dark);
        margin-bottom: 0.5rem;
      }
      .landing-card p {
        font-size: 0.9rem;
        color: var(--muted);
        line-height: 1.55;
      }
      .landing-card .go {
        margin-top: 0.75rem;
        font-size: 0.85rem;
        font-weight: 700;
        color: var(--primary-dark);
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <h1>🏊 🚴 🏃 Triathlon</h1>
      <p>練習会スケジュールとブログ</p>
      <nav class="site-nav" aria-label="サイト内">
        <a href="index.html" aria-current="page">ホーム</a>
        <a href="schedule.html">スケジュール</a>
        <a href="blog/">ブログ</a>
      </nav>
    </header>
    <main>
      <p class="landing-lead">
        サイクルショップエンドウ・Triathlon LUMINA・横浜市トライアスロン協会などの情報をもとに、練習会の日程を一覧しています。メモやレポートはブログへ。
      </p>
      <div class="landing-cards">
        <a class="landing-card" href="schedule.html">
          <h2>📅 練習会スケジュール</h2>
          <p>今後の練習会・イベントと直近の過去分。自動更新です。</p>
          <span class="go">見る →</span>
        </a>
        <a class="landing-card" href="blog/">
          <h2>📝 ブログ</h2>
          <p>参加記録、ギアのメモ、チェックリストなど。</p>
          <span class="go">見る →</span>
        </a>
      </div>
      <section class="home-blog" aria-labelledby="home-blog-heading">
        <h2 id="home-blog-heading">最近のブログ</h2>
        <div id="home-blog-list" class="post-list"></div>
        <p class="more-link"><a href="blog/">すべての記事 →</a></p>
      </section>
    </main>
    <footer class="site-footer">
      <p>
        <a href="https://github.com/japason0502/Triathlon" style="color: var(--primary-dark)">GitHub</a>
      </p>
    </footer>
    <script src="assets/js/blog-list.js"></script>
    <script>
      renderBlogList("#home-blog-list", { manifestUrl: "blog/posts.json", linkPrefix: "blog/" });
    </script>
  </body>
</html>
